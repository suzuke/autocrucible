name: "optimize-classifier"
description: "Maximize validation accuracy on a synthetic 8-class classification task using numpy-only neural networks"

files:
  editable:
    - "classifier.py"
  readonly:
    - "evaluate.py"

commands:
  run: "python3 evaluate.py > run.log 2>&1"
  eval: "grep '^val_accuracy:' run.log"

metric:
  name: "val_accuracy"
  direction: "maximize"

constraints:
  timeout_seconds: 180
  max_retries: 5

agent:
  type: "claude-code"
  instructions: "program.md"
  context_window:
    include_history: true
    history_limit: 20
    include_best: true

git:
  branch_prefix: "crucible"
  tag_failed: true
