name: "optimize-sorting"
description: "Find the fastest sorting implementation for 100k integers"

files:
  editable:
    - "sort.py"
  readonly:
    - "benchmark.py"

commands:
  run: "python3 benchmark.py > run.log 2>&1"
  eval: "grep '^ops_per_sec:' run.log"

metric:
  name: "ops_per_sec"
  direction: "maximize"

constraints:
  timeout_seconds: 60
  max_retries: 3

agent:
  type: "claude-code"
  instructions: "program.md"
  context_window:
    include_history: true
    history_limit: 15
    include_best: true

git:
  branch_prefix: "crucible"
  tag_failed: true
