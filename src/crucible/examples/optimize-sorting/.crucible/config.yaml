name: "optimize-sorting"

files:
  editable:
    - "sort.py"
  readonly: []
  hidden:
    - "benchmark.py"

commands:
  run: "python3 -u benchmark.py 2>&1 | tee run.log"
  eval: "cat run.log"

metric:
  name: "ops_per_sec"
  direction: "maximize"

constraints:
  timeout_seconds: 60
  max_retries: 3

agent:
  instructions: "program.md"

git:
  branch_prefix: "crucible"
