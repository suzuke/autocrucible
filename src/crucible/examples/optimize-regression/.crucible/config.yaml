name: "optimize-regression"

files:
  editable:
    - "model.py"
  readonly:
    - ".crucible/program.md"
  hidden:
    - "evaluate.py"

commands:
  run: "python3 -u model.py 2>&1 | tee run.log"
  eval: "cat run.log"

metric:
  name: "val_mse"
  direction: "minimize"

constraints:
  timeout_seconds: 120
  max_retries: 3
  allow_install: true

agent:
  instructions: "program.md"

git:
  branch_prefix: "crucible"
