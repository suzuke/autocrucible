name: "optimize-snake"

files:
  editable:
    - "agent.py"
  readonly:
    - ".crucible/program.md"
    - "game.py"
    - "view.py"
  hidden:
    - "evaluate.py"

commands:
  run: "python3 -u evaluate.py 2>&1 | tee run.log"
  eval: "cat run.log"

metric:
  name: "avg_score"
  direction: "maximize"

constraints:
  timeout_seconds: 60
  max_retries: 3

agent:
  instructions: "program.md"

git:
  branch_prefix: "crucible"
