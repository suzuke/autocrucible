agent:
  instructions: program.md
commands:
  eval: grep '^error:' run.log
  run: python3 -u benchmark.py > run.log 2>&1
constraints:
  max_retries: 3
  timeout_seconds: 30
evaluation:
  aggregation: median
  repeat: 3
files:
  editable:
  - estimate.py
  readonly:
    - ".crucible/program.md"
  hidden:
  - benchmark.py
git:
  branch_prefix: crucible
metric:
  direction: minimize
  name: error
name: optimize-monte-carlo
