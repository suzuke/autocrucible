name: "optimize-monte-carlo"

files:
  editable:
    - "estimate.py"
  hidden:
    - "benchmark.py"

commands:
  run: "python3 -u benchmark.py > run.log 2>&1"
  eval: "grep '^error:' run.log"

metric:
  name: "error"
  direction: "minimize"

constraints:
  timeout_seconds: 30
  max_retries: 3

agent:
  instructions: "program.md"

git:
  branch_prefix: "crucible"
