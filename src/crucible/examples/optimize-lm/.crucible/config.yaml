name: "optimize-lm"

files:
  editable:
    - "train.py"
  readonly:
    - "data.py"
  hidden:
    - "evaluate.py"

commands:
  run: "uv run python -u evaluate.py 2>&1 | tee run.log"
  eval: "cat run.log"

metric:
  name: "val_bpb"
  direction: "minimize"

constraints:
  timeout_seconds: 360
  max_retries: 10

agent:
  instructions: "program.md"

git:
  branch_prefix: "crucible"
