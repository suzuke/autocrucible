name: "optimize-regex"

files:
  editable:
    - "pattern.py"
  readonly:
    - "examples.txt"
    - ".crucible/program.md"
  hidden:
    - "evaluate.py"

commands:
  run: "python3 -u evaluate.py 2>&1 | tee run.log"
  eval: "cat run.log"

metric:
  name: "f1_score"
  direction: "maximize"

constraints:
  timeout_seconds: 30
  max_retries: 5

agent:
  instructions: "program.md"

git:
  branch_prefix: "crucible"
