name: "optimize-classifier"

files:
  editable:
    - "classifier.py"
  readonly: []
  hidden:
    - "evaluate.py"

commands:
  run: "python3 -u evaluate.py 2>&1 | tee run.log"
  eval: "cat run.log"

metric:
  name: "val_accuracy"
  direction: "maximize"

constraints:
  timeout_seconds: 180
  max_retries: 5
  allow_install: true

agent:
  instructions: "program.md"

git:
  branch_prefix: "crucible"
