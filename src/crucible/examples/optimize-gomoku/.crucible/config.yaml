name: "optimize-gomoku"

files:
  editable:
    - "agent.py"
  readonly:
    - "game.py"
  hidden:
    - "evaluate.py"
  artifacts:
    - "artifacts/"

commands:
  run: "python3 -u evaluate.py 2>&1 | tee run.log"
  eval: "cat run.log"

metric:
  name: "win_rate"
  direction: "maximize"

constraints:
  timeout_seconds: 600
  max_retries: 3

agent:
  instructions: "program.md"

git:
  branch_prefix: "crucible"
