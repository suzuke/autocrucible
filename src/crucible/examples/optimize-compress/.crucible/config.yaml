name: "optimize-compress"

files:
  editable:
    - "compress.py"
  readonly:
    - "generate_corpus.py"
    - "corpus.txt"
  hidden:
    - "evaluate.py"

commands:
  run: "python3 -u evaluate.py 2>&1 | tee run.log"
  eval: "cat run.log"

metric:
  name: "compression_ratio"
  direction: "maximize"

constraints:
  timeout_seconds: 60
  max_retries: 5

agent:
  instructions: "program.md"

git:
  branch_prefix: "crucible"
