<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 Replay Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #faf8ef;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  color: #776e65;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}
h1 { font-size: 28px; margin-bottom: 16px; }
.file-inputs {
  display: flex;
  gap: 24px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.file-inputs label {
  font-weight: 600;
  font-size: 14px;
}
.file-inputs input[type="file"] {
  margin-left: 6px;
  font-size: 13px;
}
.selectors {
  display: flex;
  gap: 20px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.selectors label { font-weight: 600; font-size: 14px; }
.selectors select {
  margin-left: 4px;
  font-size: 14px;
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid #bbada0;
}
.controls {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.controls button {
  font-size: 18px;
  padding: 4px 12px;
  border: none;
  border-radius: 6px;
  background: #8f7a66;
  color: #f9f6f2;
  cursor: pointer;
  min-width: 40px;
}
.controls button:hover { background: #776e65; }
.speed-control {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: 12px;
  font-size: 14px;
}
.speed-control input[type="range"] { width: 100px; }
.boards-container {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  justify-content: center;
}
.board-panel { text-align: center; }
.board-label {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
  min-height: 20px;
}
.info {
  font-size: 14px;
  margin-top: 8px;
  display: flex;
  gap: 16px;
  justify-content: center;
}
.info span { font-weight: 600; }
.board-grid {
  display: inline-grid;
  background: #bbada0;
  border-radius: 8px;
  padding: 8px;
  position: relative;
}
.cell {
  border-radius: 4px;
  background: #cdc1b4;
}
.tile-anim {
  position: absolute;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  font-weight: 700;
  transition: top 0.1s ease, left 0.1s ease;
  z-index: 1;
}
.tile-anim.no-transition {
  transition: none;
}
.tile-anim.tile-pop {
  animation: pop 0.15s ease-out forwards;
}
.tile-anim.tile-merge {
  animation: merge-bump 0.15s ease-out;
}
@keyframes pop {
  0%   { transform: scale(0); opacity: 0; }
  60%  { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
@keyframes merge-bump {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.move-indicator {
  font-size: 20px;
  margin-top: 6px;
  min-height: 28px;
  color: #8f7a66;
  font-weight: 700;
  letter-spacing: 2px;
}
#panel2 { display: none; }
</style>
</head>
<body>

<h1>2048 Replay Viewer</h1>

<div class="file-inputs">
  <div>
    <label>Replay 1: <input type="file" id="file1" accept=".json"></label>
  </div>
  <div>
    <label>Replay 2 (compare): <input type="file" id="file2" accept=".json"></label>
  </div>
</div>

<div class="selectors">
  <div>
    <label>Game 1: <select id="sel1"><option value="">— load file —</option></select></label>
  </div>
  <div>
    <label>Game 2: <select id="sel2"><option value="">— load file —</option></select></label>
  </div>
</div>

<div class="controls">
  <button id="btnStart" title="Start">&#x23EE;</button>
  <button id="btnPrev" title="Previous">&#x25C0;</button>
  <button id="btnPlay" title="Play">&#x25B6;</button>
  <button id="btnNext" title="Next">&#x23E9;</button>
  <button id="btnEnd" title="End">&#x23ED;</button>
  <div class="speed-control">
    <label>Speed: <input type="range" id="speedSlider" min="1" max="20" value="5"></label>
    <span id="speedLabel">5 mv/s</span>
  </div>
</div>

<div class="boards-container">
  <div class="board-panel" id="panel1">
    <div class="board-label" id="label1"></div>
    <div class="board-grid" id="grid1"></div>
    <div class="move-indicator" id="arrow1"></div>
    <div class="info" id="info1"></div>
  </div>
  <div class="board-panel" id="panel2">
    <div class="board-label" id="label2"></div>
    <div class="board-grid" id="grid2"></div>
    <div class="move-indicator" id="arrow2"></div>
    <div class="info" id="info2"></div>
  </div>
</div>

<script>
const TILE_COLORS = {
  0: '#cdc1b4', 2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563',
  32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61', 512: '#edc850',
  1024: '#edc53f', 2048: '#edc22e'
};
const DARK_TEXT = '#776e65';
const LIGHT_TEXT = '#f9f6f2';

function tileColor(v) { return TILE_COLORS[v] || '#3c3a32'; }
function textColor(v) { return (v <= 4) ? DARK_TEXT : LIGHT_TEXT; }

let data1 = null, data2 = null;
let moves1 = null, moves2 = null;
let boardSize1 = 4, boardSize2 = 4;
let tileSize1 = 100, tileSize2 = 100;
let pos = 0;
let prevPos = -1;
let playing = false;
let lastFrameTime = 0;
let speed = 5;
let animId = null;
let animTimeout = null;

const MOVE_ARROWS = { up: '⬆', down: '⬇', left: '⬅', right: '➡' };
const GAP = 8;
const PADDING = 8;

const $ = id => document.getElementById(id);

// --- 2048 move simulation ---
// Process a single line (row or column) sliding toward index 0.
// Returns array of {val, destIdx, sources: [{r,c}], merged: bool}
function slideLine(cells) {
  // cells: [{val, r, c}, ...] ordered in slide direction
  const nonZero = cells.filter(c => c.val !== 0);
  const result = [];
  let i = 0;
  while (i < nonZero.length) {
    if (i + 1 < nonZero.length && nonZero[i].val === nonZero[i + 1].val) {
      result.push({
        val: nonZero[i].val * 2,
        sources: [nonZero[i], nonZero[i + 1]],
        merged: true
      });
      i += 2;
    } else {
      result.push({
        val: nonZero[i].val,
        sources: [nonZero[i]],
        merged: false
      });
      i += 1;
    }
  }
  return result;
}

// Simulate a move and return tile movements.
// Returns: {movements: [{fromR, fromC, toR, toC, val, merged}]}
function simulateMove(board, direction, bs) {
  const movements = [];

  function processLine(cells, assignRC) {
    const result = slideLine(cells);
    result.forEach((entry, destIdx) => {
      const {toR, toC} = assignRC(destIdx);
      for (const src of entry.sources) {
        movements.push({
          fromR: src.r, fromC: src.c,
          toR, toC,
          val: entry.val,
          merged: entry.merged
        });
      }
    });
  }

  if (direction === 'left') {
    for (let r = 0; r < bs; r++) {
      const cells = [];
      for (let c = 0; c < bs; c++) cells.push({val: board[r][c], r, c});
      processLine(cells, di => ({toR: r, toC: di}));
    }
  } else if (direction === 'right') {
    for (let r = 0; r < bs; r++) {
      const cells = [];
      for (let c = bs - 1; c >= 0; c--) cells.push({val: board[r][c], r, c});
      processLine(cells, di => ({toR: r, toC: bs - 1 - di}));
    }
  } else if (direction === 'up') {
    for (let c = 0; c < bs; c++) {
      const cells = [];
      for (let r = 0; r < bs; r++) cells.push({val: board[r][c], r, c});
      processLine(cells, di => ({toR: di, toC: c}));
    }
  } else if (direction === 'down') {
    for (let c = 0; c < bs; c++) {
      const cells = [];
      for (let r = bs - 1; r >= 0; r--) cells.push({val: board[r][c], r, c});
      processLine(cells, di => ({toR: bs - 1 - di, toC: c}));
    }
  }
  return movements;
}

// Find newly spawned tiles by comparing simulated result with actual new board
function findSpawned(movements, newBoard, bs) {
  const occupied = Array.from({length: bs}, () => Array(bs).fill(false));
  // Mark cells that received tiles from movements
  const merged = {};
  for (const m of movements) {
    const key = m.toR * bs + m.toC;
    occupied[m.toR][m.toC] = true;
    if (m.merged) merged[key] = m.val;
  }
  const spawned = [];
  for (let r = 0; r < bs; r++) {
    for (let c = 0; c < bs; c++) {
      if (newBoard[r][c] !== 0 && !occupied[r][c]) {
        spawned.push({r, c, val: newBoard[r][c]});
      }
    }
  }
  return {spawned, merged};
}

// --- Grid and tile rendering ---
function cellPos(r, c, tileSize) {
  return {
    top: PADDING + r * (tileSize + GAP),
    left: PADDING + c * (tileSize + GAP)
  };
}

function createTileEl(r, c, val, tileSize, extraClass) {
  const el = document.createElement('div');
  el.className = 'tile-anim' + (extraClass ? ' ' + extraClass : '');
  const p = cellPos(r, c, tileSize);
  el.style.top = p.top + 'px';
  el.style.left = p.left + 'px';
  el.style.width = tileSize + 'px';
  el.style.height = tileSize + 'px';
  el.style.background = tileColor(val);
  el.style.color = textColor(val);
  el.textContent = val === 0 ? '' : val;
  const fs = val >= 1024 ? Math.floor(tileSize * 0.3) : Math.floor(tileSize * 0.4);
  el.style.fontSize = fs + 'px';
  return el;
}

function clearTiles(gridEl) {
  gridEl.querySelectorAll('.tile-anim').forEach(el => el.remove());
}

function loadFile(input, slot) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const d = JSON.parse(e.target.result);
    if (slot === 1) {
      data1 = d;
      populateSelect($('sel1'), d);
      selectGame(1, 'best');
    } else {
      data2 = d;
      populateSelect($('sel2'), d);
      selectGame(2, 'best');
      $('panel2').style.display = '';
    }
  };
  reader.readAsText(file);
}

function populateSelect(sel, d) {
  sel.innerHTML = '';
  if (d.best) {
    const o = document.createElement('option');
    o.value = 'best';
    o.textContent = `best (seed=${d.best.seed}, score=${d.best.score})`;
    sel.appendChild(o);
  }
  if (d.worst) {
    const o = document.createElement('option');
    o.value = 'worst';
    o.textContent = `worst (seed=${d.worst.seed}, score=${d.worst.score})`;
    sel.appendChild(o);
  }
}

function selectGame(slot, which) {
  const d = slot === 1 ? data1 : data2;
  if (!d) return;
  const game = d[which];
  if (!game) return;
  const bs = d.board_size || 4;
  if (slot === 1) {
    moves1 = game.moves;
    boardSize1 = bs;
    tileSize1 = Math.min(100, Math.floor(400 / bs));
    $('label1').textContent = `${which} (seed=${game.seed}, final=${game.score})`;
    initGrid($('grid1'), bs, tileSize1);
  } else {
    moves2 = game.moves;
    boardSize2 = bs;
    tileSize2 = Math.min(100, Math.floor(400 / bs));
    $('label2').textContent = `${which} (seed=${game.seed}, final=${game.score})`;
    initGrid($('grid2'), bs, tileSize2);
  }
  pos = 0;
  prevPos = -1;
  stopPlay();
  render();
}

function initGrid(gridEl, bs, tileSize) {
  const totalSize = PADDING * 2 + bs * tileSize + (bs - 1) * GAP;
  gridEl.style.gridTemplateColumns = `repeat(${bs}, ${tileSize}px)`;
  gridEl.style.gridTemplateRows = `repeat(${bs}, ${tileSize}px)`;
  gridEl.style.gap = GAP + 'px';
  gridEl.style.width = totalSize + 'px';
  gridEl.style.height = totalSize + 'px';
  // Remove old tiles and cells
  gridEl.innerHTML = '';
  for (let i = 0; i < bs * bs; i++) {
    const c = document.createElement('div');
    c.className = 'cell';
    c.style.width = tileSize + 'px';
    c.style.height = tileSize + 'px';
    gridEl.appendChild(c);
  }
}

// Render board instantly (no animation)
function renderBoardStatic(gridEl, board, bs, tileSize) {
  clearTiles(gridEl);
  for (let r = 0; r < bs; r++) {
    for (let c = 0; c < bs; c++) {
      const v = board[r][c];
      if (v === 0) continue;
      gridEl.appendChild(createTileEl(r, c, v, tileSize, 'no-transition'));
    }
  }
}

// Render board with slide animation
function renderBoardAnimated(gridEl, prevBoard, newBoard, direction, bs, tileSize) {
  clearTiles(gridEl);
  if (animTimeout) { clearTimeout(animTimeout); animTimeout = null; }

  const movements = simulateMove(prevBoard, direction, bs);
  const {spawned, merged} = findSpawned(movements, newBoard, bs);

  // Create tiles at their OLD positions (no transition)
  const tileEls = [];
  // Group movements by destination to handle merges
  const destMap = {};
  for (const m of movements) {
    const key = m.toR * bs + m.toC;
    if (!destMap[key]) destMap[key] = [];
    destMap[key].push(m);
  }

  // Create one tile element per source tile
  for (const m of movements) {
    const el = createTileEl(m.fromR, m.fromC, prevBoard[m.fromR][m.fromC], tileSize, 'no-transition');
    gridEl.appendChild(el);
    tileEls.push({el, movement: m});
  }

  // Force reflow
  void gridEl.offsetHeight;

  // Animate to new positions
  for (const {el, movement: m} of tileEls) {
    el.classList.remove('no-transition');
    const p = cellPos(m.toR, m.toC, tileSize);
    el.style.top = p.top + 'px';
    el.style.left = p.left + 'px';
  }

  // After slide completes: update merged values + spawn new tiles
  animTimeout = setTimeout(() => {
    clearTiles(gridEl);
    // Place final tiles
    for (let r = 0; r < bs; r++) {
      for (let c = 0; c < bs; c++) {
        const v = newBoard[r][c];
        if (v === 0) continue;
        const key = r * bs + c;
        const isMerged = key in merged;
        const isSpawned = spawned.some(s => s.r === r && s.c === c);
        let cls = '';
        if (isSpawned) cls = 'tile-pop';
        else if (isMerged) cls = 'tile-merge';
        else cls = 'no-transition';
        gridEl.appendChild(createTileEl(r, c, v, tileSize, cls));
      }
    }
    animTimeout = null;
  }, 110);
}

function renderInfo(infoEl, frame, idx, total) {
  infoEl.innerHTML = `<span>Move: ${idx}/${total - 1}</span>` +
    `<span>Score: ${frame.score}</span>` +
    `<span>Max: ${maxTile(frame.board)}</span>` +
    (frame.move ? `<span>Dir: ${frame.move}</span>` : '');
}

function maxTile(board) {
  let m = 0;
  for (const row of board) for (const v of row) if (v > m) m = v;
  return m;
}

function maxPos() {
  let m = moves1 ? moves1.length - 1 : 0;
  if (moves2) m = Math.max(m, moves2.length - 1);
  return m;
}

function renderOne(moves, gridEl, arrowEl, infoEl, bs, tileSize, forward) {
  const i = Math.min(pos, moves.length - 1);
  const pi = prevPos >= 0 ? Math.min(prevPos, moves.length - 1) : -1;
  const frame = moves[i];
  const direction = frame.move || null;

  if (forward && pi >= 0 && pi !== i && direction) {
    renderBoardAnimated(gridEl, moves[pi].board, frame.board, direction, bs, tileSize);
  } else {
    renderBoardStatic(gridEl, frame.board, bs, tileSize);
  }

  renderInfo(infoEl, frame, i, moves.length);
  arrowEl.textContent = direction ? MOVE_ARROWS[direction] || '' : '';
}

function render() {
  const forward = pos > prevPos;
  if (moves1) renderOne(moves1, $('grid1'), $('arrow1'), $('info1'), boardSize1, tileSize1, forward);
  if (moves2) renderOne(moves2, $('grid2'), $('arrow2'), $('info2'), boardSize2, tileSize2, forward);
  prevPos = pos;
}

function stopPlay() {
  playing = false;
  $('btnPlay').innerHTML = '&#x25B6;';
  if (animId) { cancelAnimationFrame(animId); animId = null; }
}

function togglePlay() {
  if (playing) { stopPlay(); return; }
  if (pos >= maxPos()) { pos = 0; prevPos = -1; }
  playing = true;
  $('btnPlay').innerHTML = '&#x23F8;';
  lastFrameTime = performance.now();
  animId = requestAnimationFrame(tick);
}

function tick(now) {
  if (!playing) return;
  const interval = 1000 / speed;
  if (now - lastFrameTime >= interval) {
    lastFrameTime = now;
    if (pos < maxPos()) {
      pos++;
      render();
    } else {
      stopPlay();
      return;
    }
  }
  animId = requestAnimationFrame(tick);
}

// Event listeners
$('file1').addEventListener('change', function() { loadFile(this, 1); });
$('file2').addEventListener('change', function() { loadFile(this, 2); });
$('sel1').addEventListener('change', function() { if (data1) selectGame(1, this.value); });
$('sel2').addEventListener('change', function() { if (data2) selectGame(2, this.value); });
$('btnStart').addEventListener('click', () => { pos = 0; prevPos = -1; stopPlay(); render(); });
$('btnPrev').addEventListener('click', () => { if (pos > 0) { pos--; stopPlay(); render(); } });
$('btnPlay').addEventListener('click', togglePlay);
$('btnNext').addEventListener('click', () => { if (pos < maxPos()) { pos++; stopPlay(); render(); } });
$('btnEnd').addEventListener('click', () => { pos = maxPos(); stopPlay(); render(); });
$('speedSlider').addEventListener('input', function() {
  speed = parseInt(this.value);
  $('speedLabel').textContent = speed + ' mv/s';
});
</script>
</body>
</html>
